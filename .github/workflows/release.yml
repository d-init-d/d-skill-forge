name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: dskillforge-linux-amd64
          - os: macos-latest
            asset_name: dskillforge-darwin-amd64
          - os: windows-latest
            asset_name: dskillforge-windows-amd64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -e ".[tui]"
          pip install pyinstaller

      - name: Build binary
        run: |
          pyinstaller --onefile --name ${{ matrix.asset_name }} --add-data "src/skillforge/tui/theme.tcss:skillforge/tui" src/skillforge/__main__.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/dskillforge-linux-amd64/dskillforge-linux-amd64
            artifacts/dskillforge-darwin-amd64/dskillforge-darwin-amd64
            artifacts/dskillforge-windows-amd64.exe/dskillforge-windows-amd64.exe
